<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ID Card Maker</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter','Noto Sans KR',sans-serif;background:#eef1f4}
.app{display:grid;grid-template-columns:340px 1fr;gap:20px;padding:20px}
.panel,.preview{background:#fff;border-radius:14px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.06)}
input,button{width:100%;margin-bottom:8px;padding:8px;border-radius:8px;border:1px solid #ddd}
input[type=color]{height:42px;padding:4px}
label{font-size:12px;color:#555}

.cards{display:flex;gap:30px;flex-wrap:wrap;justify-content:center}

.card{--main:#1f2937;--sub:#e5e7eb;width:300px;height:520px;border-radius:16px;overflow:hidden;position:relative;background:var(--sub);border:1px solid rgba(0,0,0,.08);box-shadow:0 12px 30px rgba(0,0,0,.12)}

.header{background:var(--main);color:white;padding:14px;height:100px;display:flex;flex-direction:column;justify-content:center}
.header h2{margin:0;font-size:13px;letter-spacing:2px;font-weight:600}
.level{position:absolute;top:12px;right:12px;border:1px solid rgba(255,255,255,.4);padding:2px 8px;border-radius:999px;font-size:10px;opacity:.8}

.photo{width:170px;height:210px;background:#d1d5db;border-radius:10px;margin:14px auto;overflow:hidden;position:relative}
.photo img{width:100%;height:100%;object-fit:cover;transform-origin:center center}

.identity{padding:0 18px;font-size:12px}
.identity .name{font-weight:700;font-size:14px}
.identity .code{opacity:.7}

.grid{padding:0 18px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px}
.grid div{border-top:1px solid rgba(0,0,0,.15);padding-top:4px}

.serial{position:absolute;bottom:8px;left:18px;font-size:9px;color:#666}

/* back */
.back{background:var(--main);color:white;padding:18px;position:relative}

/* world mark under NAME center */
.backmark{width:160px;height:160px;margin:10px auto 0 auto;opacity:.9}
.backmark img{width:100%;height:100%;object-fit:contain}

.barcode{margin-top:20px;height:60px;background:repeating-linear-gradient(90deg,#fff 0 3px,transparent 3px 6px)}
.barcodeText{text-align:center;margin-top:6px;letter-spacing:3px;font-size:10px}

.info{margin-top:12px;font-size:10px}
.info div{margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:3px}

</style>
</head>
<body>

<div class="app">

<div class="panel">
<h3>출입증 설정</h3>

<label>증명사진</label>
<input id="photoInput" type="file">

<label>이미지 위치 X</label>
<input id="imgX" type="range" min="-100" max="100" value="0">
<label>이미지 위치 Y</label>
<input id="imgY" type="range" min="-100" max="100" value="0">
<label>이미지 확대</label>
<input id="imgScale" type="range" min="1" max="2" step="0.01" value="1">

<label>세계관 마크</label>
<input id="markInput" type="file">

<label>메인 색상</label>
<input id="mainColor" type="color" value="#1f2937">

<label>배경 색상</label>
<input id="subColor" type="color" value="#e5e7eb">

<input id="name" placeholder="NAME">
<input id="eng" placeholder="CLASS">
<input id="code" placeholder="CODE NAME">

<input id="branch" placeholder="BRANCH">
<input id="dept" placeholder="DEPARTMENT">

<input id="pair" placeholder="PAIR">
<input id="pairId" placeholder="PAIR ID">
<input id="sync" placeholder="SYNC RATE">
<input id="clear" placeholder="CLEARANCE">
<input id="barcode" placeholder="BARCODE">

<button onclick="window.print()">PRINT</button>
</div>

<div class="preview">
<div class="cards">

<div class="card" id="front">
<div class="header">
<h2>ACCESS CARD</h2>
<div class="level" id="clearOut"></div>
</div>

<div class="photo" id="photoBox"></div>

<div class="identity">
<div class="name" id="nameOut"></div>
<div id="engOut"></div>
<div class="code" id="codeOut"></div>
</div>

<div class="grid">
<div>BRANCH<br><b id="branchOut"></b></div>
<div>CLEARANCE<br><b id="clearOut2"></b></div>
<div>DEPARTMENT<br><b id="deptOut"></b></div>
<div>SYNC<br><b id="syncOut"></b></div>
<div>PAIR<br><b id="pairOut"></b></div>
<div>ID<br><b id="pairIdOut"></b></div>
</div>

<div class="serial" id="barcodeOut"></div>
</div>

<div class="card back">
<h3>SECURITY PASS</h3>

<div class="info">
<div>NAME : <span id="nameBack"></span></div>
</div>

<div class="backmark" id="markBox"></div>

<div class="barcode"></div>
<div class="barcodeText" id="barcodeOut2"></div>

<div class="info">
<div>PAIR : <span id="pairBack"></span></div>
<div>ID : <span id="pairIdBack"></span></div>
<div>CLASS : <span id="engBack"></span></div>
</div>
</div>

</div>
</div>

</div>

<script>
const bind=(a,b)=>document.getElementById(a).oninput=e=>document.getElementById(b).innerText=e.target.value;

['name','eng','code','branch','dept','pair','pairId','sync','clear','barcode'].forEach(id=>{
  const out = id==='clear' ? ['clearOut','clearOut2'] : [id+'Out'];
  out.forEach(o=>{ if(document.getElementById(o)) bind(id,o); });
});

bind('name','nameBack');
bind('pair','pairBack');
bind('pairId','pairIdBack');
bind('eng','engBack');
bind('barcode','barcodeOut2');

let imgEl;
photoInput.onchange=e=>{
 const f=e.target.files[0];if(!f)return;
 const r=new FileReader();
 r.onload=ev=>{
   photoBox.innerHTML='<img id="charImg" src="'+ev.target.result+'">';
   imgEl=document.getElementById('charImg');
 };
 r.readAsDataURL(f);
}

function updateImg(){
 if(!imgEl) return;
 const x=imgX.value; const y=imgY.value; const s=imgScale.value;
 imgEl.style.transform=`translate(${x}px, ${y}px) scale(${s})`;
}

imgX.oninput=updateImg;
imgY.oninput=updateImg;
imgScale.oninput=updateImg;

markInput.onchange=e=>{
 const f=e.target.files[0];if(!f)return;
 const r=new FileReader();
 r.onload=ev=>markBox.innerHTML='<img src="'+ev.target.result+'">';
 r.readAsDataURL(f);
}

mainColor.oninput=e=>document.querySelectorAll('.card').forEach(c=>c.style.setProperty('--main',e.target.value));
subColor.oninput=e=>document.querySelectorAll('.card').forEach(c=>c.style.setProperty('--sub',e.target.value));

</script>

</body>
</html>
