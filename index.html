<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ID Card Maker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Pretendard',Arial,sans-serif;
  background:#eef1f4;
  color:#1f2937;
}
.app{display:grid;grid-template-columns:340px 1fr;gap:22px;padding:22px}
.panel,.preview{
  background:#fff;
  border:1px solid #e2e8f0;
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 26px rgba(15,23,42,.08);
}
.panel h3{margin:0 0 12px;font-size:18px;letter-spacing:-.02em}
label{display:block;font-size:12px;color:#64748b;margin-top:10px;font-weight:600}
input,textarea,button{
  width:100%;margin-bottom:8px;padding:9px 10px;border-radius:10px;
  border:1px solid #d8dee8;background:#f8fafc;color:#111827;
}
textarea{resize:none;height:64px}
input[type=color]{height:42px;padding:4px}
button{background:#111827;color:#fff;font-weight:600;letter-spacing:.04em;cursor:pointer}
.cards{display:flex;gap:34px;flex-wrap:wrap;justify-content:center;align-items:flex-start;padding:10px 0}

.card{
  --main:#334155;
  --sub:#f8fafc;
  width:300px;height:520px;border-radius:24px;overflow:hidden;position:relative;
  background:var(--sub);
  border:1px solid rgba(100,116,139,.22);
  box-shadow:0 16px 34px rgba(15,23,42,.12);
}
.hole{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);width:54px;height:10px;
  border-radius:999px;border:1px solid rgba(255,255,255,.8);background:rgba(255,255,255,.45);
  box-shadow:inset 0 1px 4px rgba(15,23,42,.24);z-index:4;
}
.header{
  background:var(--main);
  height:68px;
  border-bottom:1px solid rgba(100,116,139,.22);
}
.photo{
  width:176px;height:230px;background:#dbe1e8;
  border:1px solid rgba(100,116,139,.32);border-radius:14px;margin:26px auto 0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#7b8490;
  letter-spacing:.18em;font-weight:600;position:relative;z-index:2;
}
.photo img{width:100%;height:100%;object-fit:cover;transform-origin:center}
.front-info{
  position:relative;z-index:2;padding:24px 24px 0;display:grid;grid-template-columns:1fr 1fr;gap:16px 18px;
}
.field{
  border-top:1px solid rgba(100,116,139,.28);padding-top:8px;font-size:10px;
  letter-spacing:.14em;min-height:58px;color:#64748b;font-weight:600;
}
.field b{
  display:block;font-size:15px;color:var(--main);margin-top:7px;line-height:1.35;
  word-break:break-word;white-space:normal;text-align:left;letter-spacing:.02em;font-weight:600;
}

.back{
  background:var(--sub);
  padding:70px 24px 24px;
}
.qr-wrap{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  margin:0 0 36px;
}
.qr{width:128px;height:128px;padding:9px;background:#fff;border-radius:12px;box-shadow:0 10px 22px rgba(15,23,42,.14);border:1px solid rgba(100,116,139,.18)}
.barcode{
  position:relative;z-index:2;height:52px;margin:0 0 14px;
  background:repeating-linear-gradient(90deg,#111827 0 2px,transparent 2px 4px,#111827 4px 7px,transparent 7px 10px);
  background-color:#fff;border:9px solid #fff;border-radius:6px;box-shadow:0 6px 14px rgba(15,23,42,.08);
}
.barcodeText{position:relative;z-index:2;text-align:center;font-size:10px;margin:0 0 28px;letter-spacing:2px;color:#475569}
.info{position:relative;z-index:2;margin-top:0;font-size:12px;display:grid;gap:18px}
.info div{
  border-bottom:1px solid rgba(100,116,139,.26);padding:0 0 12px;display:grid;
  grid-template-columns:70px 1fr;gap:10px;align-items:start;color:#64748b;font-weight:600;letter-spacing:.08em;
}
.info span{max-width:none;text-align:right;word-break:break-word;white-space:normal;line-height:1.35;color:#111827;font-weight:600;letter-spacing:0}
.notice{
  position:relative;
  z-index:2;
  margin:12px 0 0;
  font-size:10px;
  color:#64748b;
  text-align:center;
  line-height:1.45;
  padding:0 4px;
  background:transparent;
  font-weight:500;
  word-break:keep-all;
}
.notice:empty::before{
  content:"습득 시 해당 지부로 연락 바랍니다";
  opacity:.6;
}

@media print{
  body{background:#fff}.panel{display:none}.app{display:block;padding:0}.preview{box-shadow:none;padding:0}.card{box-shadow:none;page-break-after:always}
}
</style>
</head>
<body>
<div class="app">
<div class="panel">
<h3>출입증 설정</h3>

<label>증명사진</label>
<input id="photoInput" type="file" accept="image/*">

<label>사진 위치 X</label>
<input id="imgX" type="range" min="-100" max="100" value="0">
<label>사진 위치 Y</label>
<input id="imgY" type="range" min="-100" max="100" value="0">
<label>사진 확대</label>
<input id="imgScale" type="range" min="1" max="2" step="0.01" value="1">

<label>글씨 크기(px)</label>
<input id="fontSize" type="number" min="10" max="20" step="1" value="12">
<label>글자 간격(px)</label>
<input id="letterSpace" type="number" min="0" max="5" step="0.1" value="0.5">

<label>메인 색상</label>
<input id="mainColor" type="color" value="#1f2937">
<label>배경 색상</label>
<input id="subColor" type="color" value="#e5e7eb">

<input id="code" placeholder="CODE NAME">
<input id="branch" placeholder="BRANCH">
<input id="dept" placeholder="DEPARTMENT">
<input id="clear" placeholder="CLEARANCE">

<input id="name" placeholder="NAME">
<input id="pair" placeholder="PAIR">
<input id="pairId" placeholder="ID">
<input id="qrText" placeholder="QR TEXT">
<input id="barcode" placeholder="BARCODE">

<label>안내문 (습득 시)</label>
<textarea id="noticeInput" placeholder="습득 시 ○○로 연락 바랍니다"></textarea>

<button id="downloadBtn">DOWNLOAD PNG</button>
</div>

<div class="preview">
<div class="cards">

<div class="card">
<div class="hole"></div>
<div class="header"></div>
<div class="photo" id="photoBox">PHOTO</div>

<div class="front-info" id="frontText">
<div class="field">CODE NAME<b id="codeOut"></b></div>
<div class="field">BRANCH<b id="branchOut"></b></div>
<div class="field">DEPARTMENT<b id="deptOut"></b></div>
<div class="field">CLEARANCE<b id="clearOut"></b></div>
</div>
</div>

<div class="card back">
<div class="hole"></div>

<div class="qr-wrap"><div id="qrBox" class="qr"></div></div>

<div class="barcode"></div>
<div class="barcodeText" id="barcodeOut"></div>

<div class="info">
<div>NAME <span id="nameOut"></span></div>
<div>ID <span id="idOut"></span></div>
<div>PAIR <span id="pairOut"></span></div>
</div>

<div class="notice" id="noticeOut"></div>
</div>

</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function bind(inputId, outputId){
  const input = document.getElementById(inputId);
  const output = document.getElementById(outputId);
  if(!input || !output) return;
  input.addEventListener('input', () => {
    output.innerText = input.value;
  });
}

bind('code','codeOut');
bind('branch','branchOut');
bind('dept','deptOut');
bind('clear','clearOut');
bind('name','nameOut');
bind('pair','pairOut');
bind('pairId','idOut');
bind('barcode','barcodeOut');
bind('noticeInput','noticeOut');

function renderQR(text){
  const qrBox = document.getElementById('qrBox');
  qrBox.innerHTML = '';
  if (typeof QRCode === 'undefined') {
    qrBox.textContent = 'QR';
    return;
  }
  new QRCode(qrBox, {
    text: text || ' ',
    width: 110,
    height: 110,
    colorDark: '#111827',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

document.getElementById('qrText').addEventListener('input', e => renderQR(e.target.value));
renderQR(' ');

let imgEl = null;
const photoInput = document.getElementById('photoInput');
const photoBox = document.getElementById('photoBox');
const imgX = document.getElementById('imgX');
const imgY = document.getElementById('imgY');
const imgScale = document.getElementById('imgScale');

photoInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoBox.innerHTML = '<img id="charImg" src="' + ev.target.result + '" alt="ID photo">';
    imgEl = document.getElementById('charImg');
    updateImg();
  };
  reader.readAsDataURL(file);
});

function updateImg(){
  if(!imgEl) return;
  imgEl.style.transform = `translate(${imgX.value}px, ${imgY.value}px) scale(${imgScale.value})`;
}
imgX.addEventListener('input', updateImg);
imgY.addEventListener('input', updateImg);
imgScale.addEventListener('input', updateImg);

const fontSize = document.getElementById('fontSize');
const letterSpace = document.getElementById('letterSpace');

function updateFontControls(){
  const size = Math.max(10, Math.min(20, Number(fontSize.value || 12)));
  const spacing = Math.max(0, Math.min(5, Number(letterSpace.value || 0)));
  document.querySelectorAll('.field b, .info span, .barcodeText').forEach(el => {
    el.style.fontSize = size + 'px';
    el.style.letterSpacing = spacing + 'px';
  });
}
fontSize.addEventListener('input', updateFontControls);
letterSpace.addEventListener('input', updateFontControls);
updateFontControls();

const mainColor = document.getElementById('mainColor');
const subColor = document.getElementById('subColor');
function updateColors(){
  document.querySelectorAll('.card').forEach(card => {
    card.style.setProperty('--main', mainColor.value);
    card.style.setProperty('--sub', subColor.value);
  });
}
mainColor.addEventListener('input', updateColors);
subColor.addEventListener('input', updateColors);
updateColors();

// 다운로드 기능
const downloadBtn = document.getElementById('downloadBtn');
downloadBtn.addEventListener('click', async () => {
  const cards = document.querySelectorAll('.card');

  for (let i = 0; i < cards.length; i++) {
    const canvas = await html2canvas(cards[i], { scale: 2 });
    const link = document.createElement('a');
    link.download = i === 0 ? 'card-front.png' : 'card-back.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
});

// 간단한 동작 확인용 테스트
console.assert(document.getElementById('codeOut'), 'codeOut exists');
console.assert(document.getElementById('photoBox'), 'photoBox exists');
console.assert(typeof updateImg === 'function', 'updateImg exists');
</script>
</body>
</html>
